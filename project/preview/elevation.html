<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}body{margin:0;background:#062424;padding:28px;font-family:'Gotham',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#F4F7F5}.spec{font-family:Gotham;font-weight:500;font-size:11px;letter-spacing:.08em;color:#547476;text-transform:uppercase}</style>
</head><body>
<div class="spec" style="margin-bottom:16px">Elevación · por superficie + borde · sin sombra, sin glow</div>
<div style="display:flex;gap:16px;align-items:stretch">
  <div style="flex:1;background:#062424;border:1px solid #114442;border-radius:8px;padding:18px;min-height:120px">
    <div class="spec" style="color:#66EBAC">Nivel 0</div>
    <div style="font-family:Gotham;font-weight:700;font-size:15px;margin-top:8px">Petróleo 900</div>
    <div style="font-size:12.5px;color:#C4D6CF;margin-top:6px;line-height:1.4">Canvas / fondo base.</div>
  </div>
  <div style="flex:1;background:#0B3331;border:1px solid #114442;border-radius:8px;padding:18px;min-height:120px">
    <div class="spec" style="color:#66EBAC">Nivel 1</div>
    <div style="font-family:Gotham;font-weight:700;font-size:15px;margin-top:8px">Petróleo 800</div>
    <div style="font-size:12.5px;color:#C4D6CF;margin-top:6px;line-height:1.4">Superficie de card. +1px borde 700.</div>
  </div>
  <div style="flex:1;background:#0B3331;border:1px solid #66EBAC;border-radius:8px;padding:18px;min-height:120px;transform:translateY(-4px)">
    <div class="spec" style="color:#66EBAC">Hover</div>
    <div style="font-family:Gotham;font-weight:700;font-size:15px;margin-top:8px">Lift + borde menta</div>
    <div style="font-size:12.5px;color:#C4D6CF;margin-top:6px;line-height:1.4">translateY(−4px), borde → menta.</div>
  </div>
</div></body></html>
