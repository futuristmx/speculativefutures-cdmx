<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}body{margin:0;background:#062424;padding:28px;font-family:'Gotham',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#F4F7F5}
.spec{font-family:Gotham;font-weight:500;font-size:11px;letter-spacing:.08em;color:#547476;text-transform:uppercase}
.btn{font-family:Gotham;font-weight:500;font-size:15px;padding:13px 26px;border-radius:4px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:10px;text-decoration:none}
.btn-primary{background:#66EBAC;color:#062424}
.btn-ghost{background:transparent;color:#F4F7F5;border-color:rgba(244,247,245,.4)}
.btn-link{color:#66EBAC;padding:0;font-weight:400;background:none;border:none;font-family:Gotham;text-decoration:underline;text-underline-offset:4px;font-size:15px;cursor:pointer}
.tag-terr{font-family:Gotham;font-weight:500;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;padding:7px 15px;border:1px solid #114442;border-radius:999px;color:#C4D6CF;display:inline-flex;align-items:center}
.nd{display:inline-block;width:6px;height:6px;border-radius:50%;background:#439973;margin-right:8px}
</style></head><body>
<div class="spec" style="margin-bottom:16px">Botones · radio 4px</div>
<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:18px">
  <a class="btn btn-primary">Únete a la comunidad</a>
  <a class="btn btn-ghost">Ver próximos eventos</a>
  <button class="btn-link">Propón una conversación →</button>
</div>
<div style="display:flex;gap:22px;flex-wrap:wrap">
  <span class="spec">Primario · relleno menta + texto petróleo</span>
  <span class="spec">Secundario · borde cal 40%</span>
  <span class="spec">Texto · menta subrayado, peso regular</span>
</div></body></html>
